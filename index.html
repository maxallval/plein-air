<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const formatCAD = (value) => new Intl.NumberFormat('fr-CA', { style: 'currency', currency: 'CAD' }).format(value);
        const calculateNights = (start, end) => start && end ? Math.max(0, Math.ceil((new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24))) : 0;
        const getSeason = (date) => new Date(date).getMonth() >= 5 && new Date(date).getMonth() <= 7 ? 'haute' : 'basse';
        const isWeekend = (date) => [5, 6].includes(new Date(date).getDay());

        const calculateCost = (params) => {
            const { startDate, endDate, numAdults, numChildren, campground, accommodationType, extras } = params;
            let breakdown = { nuits: 0, hebergement: 0, acces: 0, reservation: 0, extras: 0, taxes: 0 };

            if (!campground || !startDate || !endDate || !accommodationType) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Complétez tous les champs' };

            const nights = calculateNights(startDate, endDate);
            const totalPersons = numAdults + numChildren;

            if (nights === 0) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Min 1 nuit' };
            if (totalPersons === 0) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Min 1 personne' };

            const accType = campground.accommodationTypes?.[accommodationType];
            if (!accType) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Type invalide' };

            const minNights = Object.values(accType.pricing).reduce((min, p) => Math.min(min, p.minNights || 2), 999);
            const maxNights = Object.values(accType.pricing).reduce((max, p) => Math.max(max, p.maxNights || 7), 0);

            if (nights < minNights) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: `Min ${minNights} nuit(s)` };
            if (nights > maxNights) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: `Max ${maxNights} nuit(s)` };
            if (totalPersons > accType.maxCapacity) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: `Max ${accType.maxCapacity} pers.` };

            breakdown.nuits = nights;

            let nightlyRate = 0;
            let currentDate = new Date(startDate);
            while (currentDate < new Date(endDate)) {
                const season = getSeason(currentDate.toISOString().split('T')[0]);
                const weekend = isWeekend(currentDate.toISOString().split('T')[0]);
                const pricing = accType.pricing[season];
                nightlyRate += weekend ? (pricing.weekend || pricing.weekday) : pricing.weekday;
                currentDate.setDate(currentDate.getDate() + 1);
            }
            breakdown.hebergement = nightlyRate;

            let acces = 0;
            if (campground.accessFeeAdult !== undefined) {
                // SÉPAQ: frais fixes par personne (adulte/enfant)
                acces = (campground.accessFeeAdult || 0) * numAdults + (campground.accessFeeChild || 0) * numChildren;
            } else {
                // Parc du Poisson Blanc: 1% du prix de l'hébergement
                acces = nightlyRate * 0.01;
            }
            breakdown.acces = acces;
            breakdown.reservation = campground.reservationFee || 0;

            let extrasTotal = 0;
            extras.forEach(extra => {
                if (extra.quantity > 0) {
                    const extraData = campground.extras.find(e => e.id === extra.id);
                    if (extraData) {
                        // Calcul par jour: du 21 au 24 = 4 jours
                        // nuits = 3, donc jours d'utilisation = nuits + 1
                        const daysOfUse = extraData.billedPer === 'jour' 
                            ? nights + 1
                            : 1;
                        extrasTotal += extraData.price * extra.quantity * daysOfUse;
                    }
                }
            });
            breakdown.extras = extrasTotal;

            let subtotal = breakdown.hebergement + breakdown.acces + breakdown.reservation + breakdown.extras;
            breakdown.taxes = subtotal * 0.15;
            const total = subtotal + breakdown.taxes;

            return {
                total: Math.round(total * 100) / 100,
                totalPerPerson: totalPersons > 0 ? Math.round((total / totalPersons) * 100) / 100 : 0,
                totalPerNight: nights > 0 ? Math.round((total / nights) * 100) / 100 : 0,
                breakdown: {
                    nuits: nights,
                    hebergement: Math.round(breakdown.hebergement * 100) / 100,
                    acces: Math.round(breakdown.acces * 100) / 100,
                    reservation: Math.round(breakdown.reservation * 100) / 100,
                    extras: Math.round(breakdown.extras * 100) / 100,
                    taxes: Math.round(breakdown.taxes * 100) / 100
                },
                error: null
            };
        };

        const DEFAULT_CAMPGROUNDS = [
            {
                id: 2,

                                        const errors = validateCampground(editingCampground);
                                        return Object.keys(errors).length > 0 ? (
                                            <div className="warning-message">
                                                {Object.values(errors).join(', ')}
                                            </div>
                                        ) : null;
                                    })()}

                                    {/* TAB INFOS */}
                                    {modalTab === 'info' && (
                                        <>
                                            <div className="modal-form-group">
                                                <label>Nom *</label>
                                                <input 
                                                    type="text" 
                                                    value={editingCampground.name} 
                                                    onChange={(e) => setEditingCampground({...editingCampground, name: e.target.value})} 
                                                    placeholder="Ex: Camping du Lac"
                                                    className={!editingCampground.name?.trim() && editingCampground.name !== undefined ? 'form-error' : ''}
                                                    autoFocus
                                                />
                                                {!editingCampground.name?.trim() && editingCampground.name !== undefined && (
                                                    <div className="error-message">Nom obligatoire</div>
                                                )}
                                            </div>

                                            <div className="modal-form-group">
                                                <label>Région *</label>
                                                <input 
                                                    type="text" 
                                                    value={editingCampground.region} 
                                                    onChange={(e) => setEditingCampground({...editingCampground, region: e.target.value})} 
                                                    placeholder="Ex: Laurentides"
                                                    className={!editingCampground.region?.trim() && editingCampground.region !== undefined ? 'form-error' : ''}
                                                />
                                                {!editingCampground.region?.trim() && editingCampground.region !== undefined && (
                                                    <div className="error-message">Région obligatoire</div>
                                                )}
                                            </div>

                                            <div className="modal-form-group">
                                                <label>Frais de conservation/accès par personne</label>
                                                <input 
                                                    type="number" 
                                                    step="0.01" 
                                                    min="0"
                                                    value={editingCampground.accessFee || editingCampground.accessFeeAdult || 0} 
                                                    onChange={(e) => {
                                                        const val = parseFloat(e.target.value) || 0;
                                                        setEditingCampground({...editingCampground, accessFee: val, accessFeeAdult: val});
                                                    }} 
                                                    placeholder="0.00"
                                                    className={(editingCampground.accessFee < 0 || editingCampground.accessFeeAdult < 0) ? 'form-error' : ''}
                                                />
                                                <div style={{fontSize: '0.75rem', color: '#999', marginTop: '0.3rem'}}>
                                                    Laisser 0 pour 1% du prix hébergement (Parc du Poisson Blanc)
                                                </div>
                                            </div>

                                            <div className="modal-form-group">
                                                <label>Capacité max</label>
                                                <input 
                                                    type="number" 
                                                    min="1"
                                                    value={editingCampground.maxCapacity || 8}
                                                    onChange={(e) => setEditingCampground({...editingCampground, maxCapacity: parseInt(e.target.value) || 8})}
                                                />
                                            </div>

                                            <div className="modal-form-group">
                                                <label style={{display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
                                                    <input 
                                                        type="checkbox" 
                                                        checked={editingCampground.dogsAllowed || false}
                                                        onChange={(e) => setEditingCampground({...editingCampground, dogsAllowed: e.target.checked})}
                                                        style={{width: '16px', height: '16px', cursor: 'pointer'}}
                                                    />
                                                    Chiens autorisés
                                                </label>
                                            </div>
                                        </>
                                    )}

                                    {/* TAB HÉBERGEMENTS */}
                                    {modalTab === 'housing' && (
                                        <>
                                            <button className="add-btn" onClick={addHousingType}>+ Ajouter type d'hébergement</button>
                                            {Object.entries(editingCampground.accommodationTypes || {}).map(([typeId, type]) => (
                                                <div key={typeId} className="housing-item">
                                                    <div className="modal-form-group">
                                                        <label>Nom du type</label>
                                                        <input 
                                                            type="text" 
                                                            value={type.label}
                                                            onChange={(e) => setEditingCampground({
                                                                ...editingCampground,
                                                                accommodationTypes: {
                                                                    ...editingCampground.accommodationTypes,
                                                                    [typeId]: {...type, label: e.target.value}
                                                                }
                                                            })}
                                                            placeholder="Ex: 1 tente"
                                                        />
                                                    </div>

                                                    <div className="modal-form-group">
                                                        <label>Capacité max</label>
                                                        <input 
                                                            type="number" 
                                                            min="1"
                                                            value={type.maxCapacity || 4}
                                                            onChange={(e) => setEditingCampground({
                                                                ...editingCampground,
                                                                accommodationTypes: {
                                                                    ...editingCampground.accommodationTypes,
                                                                    [typeId]: {...type, maxCapacity: parseInt(e.target.value) || 4}
                                                                }
                                                            })}
                                                        />
                                                    </div>

                                                    <label style={{marginTop: '0.75rem', display: 'block', fontSize: '0.85rem', fontWeight: 600, textTransform: 'uppercase'}}>Basse saison</label>
                                                    <div className="housing-row">
                                                        <div className="modal-form-group" style={{marginBottom: 0}}>
                                                            <label>Semaine</label>
                                                            <input 
                                                                type="number" 
                                                                step="0.01"
                                                                min="0"
                                                                value={type.pricing?.basse?.weekday || 0}
                                                                onChange={(e) => setEditingCampground({
                                                                    ...editingCampground,
                                                                    accommodationTypes: {
                                                                        ...editingCampground.accommodationTypes,
                                                                        [typeId]: {
                                                                            ...type,
                                                                            pricing: {
                                                                                ...type.pricing,
                                                                                basse: {...type.pricing.basse, weekday: parseFloat(e.target.value) || 0}
                                                                            }
                                                                        }
                                                                    }
                                                                })}
                                                            />
                                                        </div>
                                                        <div className="modal-form-group" style={{marginBottom: 0}}>
                                                            <label>Weekend</label>
                                                            <input 
                                                                type="number" 
                                                                step="0.01"
                                                                min="0"
                                                                value={type.pricing?.basse?.weekend || 0}
                                                                onChange={(e) => setEditingCampground({
                                                                    ...editingCampground,
                                                                    accommodationTypes: {
                                                                        ...editingCampground.accommodationTypes,
                                                                        [typeId]: {
                                                                            ...type,
                                                                            pricing: {
                                                                                ...type.pricing,
                                                                                basse: {...type.pricing.basse, weekend: parseFloat(e.target.value) || 0}
                                                                            }
                                                                        }
                                                                    }
                                                                })}
                                                            />
                                                        </div>
                                                    </div>

                                                    <label style={{marginTop: '0.75rem', display: 'block', fontSize: '0.85rem', fontWeight: 600, textTransform: 'uppercase'}}>Haute saison (juin-août)</label>
                                                    <div className="housing-row">
                                                        <div className="modal-form-group" style={{marginBottom: 0}}>
                                                            <label>Semaine</label>
                                                            <input 
                                                                type="number" 
                                                                step="0.01"
                                                                min="0"
                                                                value={type.pricing?.haute?.weekday || 0}
                                                                onChange={(e) => setEditingCampground({
                                                                    ...editingCampground,
                                                                    accommodationTypes: {
                                                                        ...editingCampground.accommodationTypes,
                                                                        [typeId]: {
                                                                            ...type,
                                                                            pricing: {
                                                                                ...type.pricing,
                                                                                haute: {...type.pricing.haute, weekday: parseFloat(e.target.value) || 0}
                                                                            }
                                                                        }
                                                                    }
                                                                })}
                                                            />
                                                        </div>
                                                        <div className="modal-form-group" style={{marginBottom: 0}}>
                                                            <label>Weekend</label>
                                                            <input 
                                                                type="number" 
                                                                step="0.01"
                                                                min="0"
                                                                value={type.pricing?.haute?.weekend || 0}
                                                                onChange={(e) => setEditingCampground({
                                                                    ...editingCampground,
                                                                    accommodationTypes: {
                                                                        ...editingCampground.accommodationTypes,
                                                                        [typeId]: {
                                                                            ...type,
                                                                            pricing: {
                                                                                ...type.pricing,
                                                                                haute: {...type.pricing.haute, weekend: parseFloat(e.target.value) || 0}
                                                                            }
                                                                        }
                                                                    }
                                                                })}
                                                            />
                                                        </div>
                                                    </div>

                                                    <button className="remove-btn" onClick={() => removeHousingType(typeId)}>✕ Supprimer</button>
                                                </div>
                                            ))}
                                        </>
                                    )}

                                    {/* TAB EXTRAS */}
                                    {modalTab === 'extras' && (
                                        <>
                                            <button className="add-btn" onClick={addExtra}>+ Ajouter extra</button>
                                            {editingCampground.extras?.map((extra, idx) => (
                                                <div key={extra.id} className="extra-item-edit">
                                                    <div className="modal-form-group">
                                                        <label>Nom</label>
                                                        <input 
                                                            type="text" 
                                                            value={extra.name}
                                                            onChange={(e) => {
                                                                const updated = [...editingCampground.extras];
                                                                updated[idx].name = e.target.value;
                                                                setEditingCampground({...editingCampground, extras: updated});
                                                            }}
                                                            placeholder="Ex: Canot 2 bancs"
                                                        />
                                                    </div>

                                                    <div className="housing-row">
                                                        <div className="modal-form-group" style={{marginBottom: 0}}>
                                                            <label>Prix</label>
                                                            <input 
                                                                type="number" 
                                                                step="0.01"
                                                                min="0"
                                                                value={extra.price}
                                                                onChange={(e) => {
                                                                    const updated = [...editingCampground.extras];
                                                                    updated[idx].price = parseFloat(e.target.value) || 0;
                                                                    setEditingCampground({...editingCampground, extras: updated});
                                                                }}
                                                            />
                                                        </div>
                                                        <div className="modal-form-group" style={{marginBottom: 0}}>
                                                            <label>Facturé par</label>
                                                            <select 
                                                                value={extra.billedPer}
                                                                onChange={(e) => {
                                                                    const updated = [...editingCampground.extras];
                                                                    updated[idx].billedPer = e.target.value;
                                                                    setEditingCampground({...editingCampground, extras: updated});
                                                                }}
                                                            >
                                                                <option value="jour">Jour</option>
                                                                <option value="séjour">Séjour</option>
                                                            </select>
                                                        </div>
                                                    </div>

                                                    <button className="remove-btn" onClick={() => removeExtra(extra.id)}>✕ Supprimer</button>
                                                </div>
                                            ))}
                                        </>
                                    )}

                                    <div className="modal-actions">
                                        <div style={{flex: 1}}>
                                            <div className="keyboard-hint">
                                                <span className="kbd">Esc</span> pour fermer &nbsp; | &nbsp;
                                                <span className="kbd">Ctrl+↵</span> pour sauvegarder
                                            </div>
                                        </div>
                                        <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Annuler</button>
                                        <button 
                                            className="btn btn-primary" 
                                            onClick={saveEditedCampground}
                                            disabled={!editingCampground.name?.trim() || !editingCampground.region?.trim()}
                                            style={{opacity: (!editingCampground.name?.trim() || !editingCampground.region?.trim()) ? 0.5 : 1, cursor: (!editingCampground.name?.trim() || !editingCampground.region?.trim()) ? 'not-allowed' : 'pointer'}}
                                        >
                                            Sauvegarder
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

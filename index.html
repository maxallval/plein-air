<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampCalc - Calculateur de Camping</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff;
            color: #000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
            padding: 2rem 1rem;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .header p {
            font-size: 0.95rem;
            color: #666;
        }

        .tabs {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .tab-btn {
            padding: 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: #666;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: #000;
            border-bottom-color: #000;
        }

        .header-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .header-input-group {
            display: flex;
            flex-direction: column;
        }

        .header-input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .header-input-group input {
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .campgrounds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .campground-card {
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }

        .campground-card:hover {
            border-color: #e0e0e0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .campground-card.selected {
            border-color: #000;
            background: #fafafa;
        }

        .campground-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .campground-header h4 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .campground-header img {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .campground-region {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .campground-price {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .extras-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .extra-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
        }

        .extra-info {
            flex: 1;
        }

        .extra-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .extra-price {
            font-size: 0.85rem;
            color: #666;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 0.25rem;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .qty-btn:hover {
            background: #f0f0f0;
        }

        .qty-display {
            min-width: 30px;
            text-align: center;
            font-weight: 500;
        }

        .results-box {
            position: sticky;
            top: 100px;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 1.5rem;
            background: #fff;
        }

        .camping-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .result-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .price-display {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }

        .breakdown-label {
            color: #666;
        }

        .breakdown-value {
            font-weight: 600;
        }

        .sub-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .sub-info-item {
            text-align: center;
        }

        .sub-info-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.25rem;
        }

        .sub-info-value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .error {
            color: #d32f2f;
            padding: 0.75rem;
            background: #ffebee;
            border-radius: 6px;
        }

        .info-text {
            color: #999;
            text-align: center;
            padding: 2rem 0;
        }

        .share-btn {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1.5rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
        }

        .share-btn:hover {
            opacity: 0.8;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .card {
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .campground-item {
            padding: 1rem;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .campground-item h4 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .campground-item img {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .campground-item p {
            color: #666;
            font-size: 0.9rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .campgrounds-grid {
                grid-template-columns: 1fr;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .results-box {
                position: static;
            }

            .price-display {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==================== DATA ====================
        const CAMPGROUNDS = [
            {
                id: 2,
                name: 'SÉPAQ',
                region: 'Partout au Québec',
                favicon: 'https://www.google.com/s2/favicons?sz=32&domain_url=https%3A%2F%2Fwww.sepaq.com%2Fhome%2Findex.dot%3Flanguage_id%3D2',
                maxCapacity: 8,
                accessFeeAdult: 8.78,
                accessFeeChild: 0,
                accommodationTypes: {
                    'camping-rustique': { label: 'Camping rustique', maxCapacity: 4, pricing: { basse: { weekday: 26.50, weekend: 26.50 }, haute: { weekday: 31.58, weekend: 31.58 } } },
                    'camping-ns': { label: 'Camping sans service', maxCapacity: 8, pricing: { basse: { weekday: 37.13, weekend: 37.13 }, haute: { weekday: 44.20, weekend: 44.20 } } },
                    'camping-1service': { label: 'Camping 1 service - Eau ou Électricité', maxCapacity: 6, pricing: { basse: { weekday: 41.40, weekend: 41.40 }, haute: { weekday: 48.00, weekend: 48.00 } } },
                    'camping-2services': { label: 'Camping 2 services - Eau et Électricité', maxCapacity: 6, pricing: { basse: { weekday: 48.50, weekend: 48.50 }, haute: { weekday: 58.20, weekend: 58.20 } } },
                    'camping-3services': { label: 'Camping 3 services - Eau, Électricité et Égout', maxCapacity: 6, pricing: { basse: { weekday: 55.38, weekend: 55.38 }, haute: { weekday: 66.95, weekend: 66.95 } } }
                },
                extras: []
            },
            {
                id: 3,
                name: 'Parc régional Montagne du Diable',
                region: 'Laurentides',
                favicon: 'https://cdn.shortpixel.ai/spai2/w_216+q_lossy+ret_img+to_webp/www.parcmontagnedudiable.com/wp-content/uploads/2016/05/parc-regional-montagne2.png',
                maxCapacity: 6,
                accessFeeAdult: 7.83,
                accessFeeChild: 0,
                accommodationTypes: {
                    'camping-rustique-reg': { label: 'Camping rustique - Emplacement régulier', maxCapacity: 4, pricing: { basse: { weekday: 45.00, weekend: 45.00 }, haute: { weekday: 45.00, weekend: 45.00 } } },
                    'camping-rustique-plate': { label: 'Camping rustique - Plate-forme', maxCapacity: 4, pricing: { basse: { weekday: 40.00, weekend: 40.00 }, haute: { weekday: 40.00, weekend: 40.00 } } },
                    'camping-2services-md': { label: 'Camping 2 services - Eau et Électricité', maxCapacity: 6, pricing: { basse: { weekday: 55.00, weekend: 55.00 }, haute: { weekday: 55.00, weekend: 55.00 } } },
                    'prets-a-camper-sem': { label: 'Prêt-à-camper - Semaine', maxCapacity: 4, pricing: { basse: { weekday: 90.00, weekend: 90.00 }, haute: { weekday: 90.00, weekend: 90.00 } } },
                    'prets-a-camper-we': { label: 'Prêt-à-camper - Fin de semaine', maxCapacity: 4, pricing: { basse: { weekday: 110.00, weekend: 110.00 }, haute: { weekday: 110.00, weekend: 110.00 } } },
                    'stationnement-vr': { label: 'Stationnement VR (P2 ou P3)', maxCapacity: 8, pricing: { basse: { weekday: 40.00, weekend: 40.00 }, haute: { weekday: 40.00, weekend: 40.00 } } }
                },
                extras: [
                    { id: 101, name: 'Tente additionnelle', price: 20.00, billedPer: 'jour' },
                    { id: 102, name: 'Location canot', price: 0.00, billedPer: 'séjour' },
                    { id: 103, name: 'Location kayak', price: 0.00, billedPer: 'séjour' },
                    { id: 104, name: 'Location vélo de montagne', price: 0.00, billedPer: 'séjour' }
                ]
            },
            {
                id: 4,
                name: 'Mont des Morios',
                region: 'Lanaudière',
                favicon: '',
                maxCapacity: 20,
                accessFeeAdult: 10.00,
                accessFeeChild: 0,
                accommodationTypes: {
                    'camping-sauvage-sommet': { label: 'Camping sauvage - Sommet (Gratuit)', maxCapacity: 20, pricing: { basse: { weekday: 0.00, weekend: 0.00 }, haute: { weekday: 0.00, weekend: 0.00 } } }
                },
                extras: [
                    { id: 201, name: 'Contribution basse saison', price: 5.00, billedPer: 'séjour' },
                    { id: 202, name: 'Contribution haute saison', price: 10.00, billedPer: 'séjour' },
                    { id: 203, name: 'Droit de circulation (ZEC des Martres)', price: 14.25, billedPer: 'séjour' },
                    { id: 204, name: 'Carte topographique', price: 0.00, billedPer: 'séjour' }
                ]
            },
            {
                id: 1,
                name: 'Parc du Poisson Blanc',
                region: 'Outaouais',
                favicon: 'https://poissonblanc.ca/img/favicon/pb-favicon-32x32.png',
                maxCapacity: 16,
                accessFee: 0,
                accommodationTypes: {
                    '1tente-ile': { label: 'Camping sur île - 1 tente (max 4 pers.)', maxCapacity: 4, pricing: { basse: { weekday: 59.00, weekend: 79.00 }, haute: { weekday: 89.00, weekend: 89.00 } } },
                    '2tentes-ile': { label: 'Camping sur île - 2 tentes (max 8 pers.)', maxCapacity: 8, pricing: { basse: { weekday: 69.00, weekend: 99.00 }, haute: { weekday: 109.00, weekend: 109.00 } } },
                    '3tentes-ile': { label: 'Camping sur île - 3 tentes (max 12 pers.)', maxCapacity: 12, pricing: { basse: { weekday: 79.00, weekend: 119.00 }, haute: { weekday: 129.00, weekend: 129.00 } } },
                    '4tentes-ile': { label: 'Camping sur île - 4 tentes (max 16 pers.)', maxCapacity: 16, pricing: { basse: { weekday: 89.00, weekend: 139.00 }, haute: { weekday: 149.00, weekend: 149.00 } } },
                    'prets-a-camper-pb': { label: 'Prêt-à-camper (Micro-refuge / Tente prospecteur)', maxCapacity: 4, pricing: { basse: { weekday: 99.00, weekend: 99.00 }, haute: { weekday: 144.00, weekend: 144.00 } } }
                },
                extras: [
                    { id: 1, name: 'Canot 16\' - 2 bancs', price: 43.00, billedPer: 'jour' },
                    { id: 2, name: 'Canot 17\' - 3 bancs', price: 51.00, billedPer: 'jour' },
                    { id: 3, name: 'Canot 20\' - 4 bancs', price: 61.00, billedPer: 'jour' },
                    { id: 4, name: 'Kayak de mer solo (Epsilon 200)', price: 38.00, billedPer: 'jour' },
                    { id: 5, name: 'Surf à pagaie (SUP) adulte', price: 33.00, billedPer: 'jour' },
                    { id: 8, name: 'Surf à pagaie (SUP) enfants', price: 22.00, billedPer: 'jour' }
                ]
            }
        ];

        // ==================== UTILITIES ====================
        const formatCAD = (value) => new Intl.NumberFormat('fr-CA', { style: 'currency', currency: 'CAD' }).format(value);

        const calculateNights = (start, end) => {
            if (!start || !end) return 0;
            return Math.ceil((new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24));
        };

        const getSeason = (dateStr) => {
            const month = new Date(dateStr).getMonth();
            return month >= 5 && month <= 7 ? 'haute' : 'basse';
        };

        const isWeekend = (dateStr) => [5, 6].includes(new Date(dateStr).getDay());

        const calculateCost = ({ startDate, endDate, numAdults, numChildren, campground, accommodationType, extras }) => {
            let breakdown = { nuits: 0, hebergement: 0, acces: 0, extras: 0, taxes: 0 };

            if (!campground || !startDate || !endDate || !accommodationType) 
                return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Complétez tous les champs' };

            const nights = calculateNights(startDate, endDate);
            const totalPersons = numAdults + numChildren;

            if (nights === 0) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Min 1 nuit' };
            if (totalPersons === 0) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Min 1 personne' };

            const accType = campground.accommodationTypes?.[accommodationType];
            if (!accType) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Type invalide' };
            if (totalPersons > accType.maxCapacity) 
                return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: `Max ${accType.maxCapacity} pers.` };

            breakdown.nuits = nights;

            // Hébergement
            let nightlyRate = 0;
            let currentDate = new Date(startDate);
            while (currentDate < new Date(endDate)) {
                const season = getSeason(currentDate.toISOString().split('T')[0]);
                const weekend = isWeekend(currentDate.toISOString().split('T')[0]);
                const pricing = accType.pricing[season];
                nightlyRate += weekend ? (pricing.weekend || pricing.weekday) : pricing.weekday;
                currentDate.setDate(currentDate.getDate() + 1);
            }
            breakdown.hebergement = nightlyRate;

            // Accès
            let acces = 0;
            if (campground.id === 4) {
                acces = (campground.accessFeeAdult || 0) * numAdults;
            } else if (campground.accessFeeAdult !== undefined) {
                acces = (campground.accessFeeAdult || 0) * numAdults + (campground.accessFeeChild || 0) * numChildren;
            } else {
                acces = nightlyRate * 0.01;
            }
            breakdown.acces = acces;

            // Extras
            let extrasTotal = 0;
            extras.forEach(extra => {
                if (extra.quantity > 0) {
                    const extraData = campground.extras.find(e => e.id === extra.id);
                    if (extraData) {
                        const daysOfUse = extraData.billedPer === 'jour' ? nights + 1 : 1;
                        extrasTotal += extraData.price * extra.quantity * daysOfUse;
                    }
                }
            });
            breakdown.extras = extrasTotal;

            const subtotal = breakdown.hebergement + breakdown.acces + breakdown.extras;
            breakdown.taxes = Math.round(subtotal * 0.15 * 100) / 100;
            const total = Math.round((subtotal + breakdown.taxes) * 100) / 100;

            return {
                total,
                totalPerPerson: totalPersons > 0 ? Math.round(total / totalPersons * 100) / 100 : 0,
                totalPerNight: nights > 0 ? Math.round(total / nights * 100) / 100 : 0,
                breakdown
            };
        };

        // ==================== APP ====================
        function App() {
            const [activeTab, setActiveTab] = useState('calculator');
            const [campgrounds] = useState(CAMPGROUNDS);
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [numAdults, setNumAdults] = useState(2);
            const [numChildren, setNumChildren] = useState(0);
            const [selectedCampground, setSelectedCampground] = useState(null);
            const [accommodationType, setAccommodationType] = useState('');
            const [extras, setExtras] = useState([]);

            // Init
            useEffect(() => {
                if (campgrounds.length > 0 && !selectedCampground) {
                    const first = campgrounds[0];
                    setSelectedCampground(first);
                    setExtras(first.extras.map(e => ({ id: e.id, quantity: 0 })));
                    const firstKey = Object.keys(first.accommodationTypes || {})[0];
                    if (firstKey) setAccommodationType(firstKey);
                }
            }, []);

            // Change campground
            const handleCampgroundChange = (camp) => {
                setSelectedCampground(camp);
                setExtras(camp.extras.map(e => ({ id: e.id, quantity: 0 })));
                const firstKey = Object.keys(camp.accommodationTypes || {})[0];
                if (firstKey) setAccommodationType(firstKey);
            };

            // Auto-contributions Morio
            useEffect(() => {
                if (selectedCampground?.id === 4 && startDate && endDate) {
                    let basseNights = 0, hauteNights = 0;
                    let currentDate = new Date(startDate);
                    while (currentDate < new Date(endDate)) {
                        const season = getSeason(currentDate.toISOString().split('T')[0]);
                        if (season === 'basse') basseNights++;
                        else hauteNights++;
                        currentDate.setDate(currentDate.getDate() + 1);
                    }
                    
                    const newExtras = extras.filter(e => e.id !== 201 && e.id !== 202);
                    newExtras.push({ id: hauteNights >= basseNights ? 202 : 201, quantity: 1 });
                    setExtras(newExtras);
                }
            }, [selectedCampground?.id, startDate, endDate]);

            const result = calculateCost({ startDate, endDate, numAdults, numChildren, campground: selectedCampground, accommodationType, extras });

            const getBasePrice = (camp) => {
                const prices = [];
                Object.values(camp.accommodationTypes || {}).forEach(type => {
                    Object.values(type.pricing || {}).forEach(season => {
                        prices.push(season.weekday || 0);
                    });
                });
                const basePrice = prices.length > 0 ? Math.min(...prices) : 0;
                return camp.id === 4 ? 10.00 + 5.00 : basePrice;
            };

            const handleShare = () => {
                const text = `${selectedCampground.name}\n\nDates: ${startDate} au ${endDate}\nPersonnes: ${numAdults} adultes, ${numChildren} enfants\nHébergement: ${accommodationType}\n\nCoûts:\nHébergement: ${formatCAD(result.breakdown.hebergement)}\nFrais d'accès: ${formatCAD(result.breakdown.acces)}\nExtras: ${formatCAD(result.breakdown.extras)}\nTaxes: ${formatCAD(result.breakdown.taxes)}\n\nTOTAL: ${formatCAD(result.total)}\nPar personne: ${formatCAD(result.totalPerPerson)}\nPar nuit: ${formatCAD(result.totalPerNight)}`;
                if (navigator.share) {
                    navigator.share({ title: 'CampCalc - ' + selectedCampground.name, text });
                } else {
                    navigator.clipboard.writeText(text);
                    alert('Tableau copié au presse-papiers!');
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>CampCalc</h1>
                        <p>Calculateur de camping</p>
                    </div>

                    <div className="tabs">
                        <button className={`tab-btn ${activeTab === 'calculator' ? 'active' : ''}`} onClick={() => setActiveTab('calculator')}>Calculateur</button>
                        <button className={`tab-btn ${activeTab === 'admin' ? 'active' : ''}`} onClick={() => setActiveTab('admin')}>Gestion</button>
                    </div>

                    {activeTab === 'calculator' && (
                        <div>
                            <div style={{padding: '1rem', borderBottom: '1px solid #f0f0f0', background: '#fafafa'}}>
                                <div style={{maxWidth: '1200px', margin: '0 auto'}}>
                                    <div className="header-inputs">
                                        <div className="header-input-group">
                                            <label>Dates</label>
                                            <div style={{display: 'flex', gap: '0.5rem'}}>
                                                <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} style={{flex: 1}} />
                                                <span style={{alignSelf: 'center', fontWeight: '500'}}>→</span>
                                                <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} style={{flex: 1}} />
                                            </div>
                                        </div>
                                        <div className="header-input-group">
                                            <label>Adultes</label>
                                            <input type="number" min="0" value={numAdults} onChange={(e) => setNumAdults(Math.max(0, parseInt(e.target.value) || 0))} />
                                        </div>
                                        <div className="header-input-group">
                                            <label>Enfants</label>
                                            <input type="number" min="0" value={numChildren} onChange={(e) => setNumChildren(Math.max(0, parseInt(e.target.value) || 0))} />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div style={{maxWidth: '1200px', margin: '0 auto', padding: '2rem 1rem'}}>
                                <div className="campgrounds-grid">
                                    {campgrounds.map(camp => (
                                        <div key={camp.id} className={`campground-card ${selectedCampground?.id === camp.id ? 'selected' : ''}`} onClick={() => handleCampgroundChange(camp)}>
                                            <div className="campground-header">
                                                {camp.favicon && <img src={camp.favicon} alt="" />}
                                                <h4>{camp.name}</h4>
                                            </div>
                                            <p className="campground-region">{camp.region}</p>
                                            <div className="campground-price">{formatCAD(getBasePrice(camp))}</div>
                                        </div>
                                    ))}
                                </div>

                                {selectedCampground && (
                                    <div className="content-grid">
                                        <div>
                                            <div className="form-group">
                                                <label>Hébergement</label>
                                                <select value={accommodationType} onChange={(e) => setAccommodationType(e.target.value)}>
                                                    {Object.entries(selectedCampground.accommodationTypes || {}).map(([key, type]) => (
                                                        <option key={key} value={key}>{type.label}</option>
                                                    ))}
                                                </select>
                                            </div>

                                            {selectedCampground.extras.length > 0 && (
                                                <div className="form-group">
                                                    <label>Extras</label>
                                                    <div className="extras-list">
                                                        {selectedCampground.extras.map(extra => {
                                                            if (selectedCampground.id === 4 && (extra.id === 201 || extra.id === 202)) return null;
                                                            const extrasState = extras.find(e => e.id === extra.id) || { quantity: 0 };
                                                            const daysOfUse = extra.billedPer === 'jour' ? calculateNights(startDate, endDate) + 1 : 1;
                                                            return (
                                                                <div key={extra.id} className="extra-item">
                                                                    <div className="extra-info">
                                                                        <div className="extra-name">{extra.name}</div>
                                                                        <div className="extra-price">{formatCAD(extra.price)}/{extra.billedPer === 'jour' ? `jour (${daysOfUse} jours)` : 'séjour'}</div>
                                                                    </div>
                                                                    <div className="qty-control">
                                                                        <button className="qty-btn" onClick={() => setExtras(extras.map(e => e.id === extra.id ? { ...e, quantity: Math.max(0, e.quantity - 1) } : e))}>−</button>
                                                                        <span className="qty-display">{extrasState.quantity}</span>
                                                                        <button className="qty-btn" onClick={() => setExtras(extras.map(e => e.id === extra.id ? { ...e, quantity: e.quantity + 1 } : e))}>+</button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="results-box">
                                            <div className="camping-title">{selectedCampground.name}</div>
                                            <div className="result-label">Total</div>
                                            {result.error ? (
                                                <div className="error">{result.error}</div>
                                            ) : result.total > 0 ? (
                                                <>
                                                    <div className="price-display">{formatCAD(result.total)}</div>
                                                    <div className="breakdown-row">
                                                        <span className="breakdown-label">Hébergement ({result.breakdown.nuits} nuits)</span>
                                                        <span className="breakdown-value">{formatCAD(result.breakdown.hebergement)}</span>
                                                    </div>
                                                    {result.breakdown.acces > 0 && (
                                                        <div className="breakdown-row">
                                                            <span className="breakdown-label">{selectedCampground.id === 1 ? 'Frais de conservation' : 'Frais d\'accès'}</span>
                                                            <span className="breakdown-value">{formatCAD(result.breakdown.acces)}</span>
                                                        </div>
                                                    )}
                                                    {result.breakdown.extras > 0 && (
                                                        <div className="breakdown-row">
                                                            <span className="breakdown-label">Extras</span>
                                                            <span className="breakdown-value">{formatCAD(result.breakdown.extras)}</span>
                                                        </div>
                                                    )}
                                                    <div className="breakdown-row">
                                                        <span className="breakdown-label">Taxes (15%)</span>
                                                        <span className="breakdown-value">{formatCAD(result.breakdown.taxes)}</span>
                                                    </div>
                                                    <div className="sub-info">
                                                        <div className="sub-info-item">
                                                            <div className="sub-info-label">Par personne</div>
                                                            <div className="sub-info-value">{formatCAD(result.totalPerPerson)}</div>
                                                        </div>
                                                        <div className="sub-info-item">
                                                            <div className="sub-info-label">Par nuit</div>
                                                            <div className="sub-info-value">{formatCAD(result.totalPerNight)}</div>
                                                        </div>
                                                    </div>
                                                    <button className="share-btn" onClick={handleShare}>📤 Partager / Copier</button>
                                                </>
                                            ) : (
                                                <div className="info-text">Remplissez les champs pour calculer</div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {activeTab === 'admin' && (
                        <div style={{maxWidth: '1200px', margin: '0 auto', padding: '2rem 1rem'}}>
                            <div className="admin-grid">
                                <div className="card">
                                    <h3>Campings</h3>
                                    <div>
                                        {campgrounds.map(camp => (
                                            <div key={camp.id} className="campground-item">
                                                <h4>{camp.favicon && <img src={camp.favicon} alt="" />} {camp.name}</h4>
                                                <p>{camp.region}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="card">
                                    <h3>Infos</h3>
                                    <div className="stats-grid">
                                        <div className="stat-card">
                                            <div className="stat-label">Campings</div>
                                            <div className="stat-value">{campgrounds.length}</div>
                                        </div>
                                        <div className="stat-card">
                                            <div className="stat-label">Régions</div>
                                            <div className="stat-value">{new Set(campgrounds.map(c => c.region)).size}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>

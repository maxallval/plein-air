<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampCalc</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.5;
        }

        .container { display: flex; flex-direction: column; min-height: 100vh; }

        .header {
            padding: 3rem 2rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .header p { font-size: 0.95rem; color: #666; }

        .tabs {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
            padding: 0 2rem;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            flex: 1;
            padding: 1rem 2rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #999;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover { color: #000; }
        .tab-btn.active { color: #000; border-bottom-color: #000; }

        .content {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .calculator {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        @media (max-width: 900px) {
            .calculator { grid-template-columns: 1fr; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #000;
        }

        .form-group input,
        .form-group select {
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            background: #ffffff;
            color: #000;
            transition: border 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #000;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .campground-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .campground-card {
            padding: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            background: #ffffff;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .campground-card:hover {
            border-color: #000;
            background: #fafafa;
        }

        .campground-card.selected {
            border-color: #000;
            background: #f0f0f0;
        }

        .campground-card h4 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .campground-card p {
            font-size: 0.8rem;
            color: #999;
        }

        .extras-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .extra-item {
            padding: 1rem;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
        }

        .extra-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .extra-price {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.25rem;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #ffffff;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: #ffffff;
            color: #000;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            border-color: #000;
        }

        .qty-display {
            min-width: 24px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .results-box {
            border: 1px solid #e0e0e0;
            padding: 2rem;
            border-radius: 8px;
            position: sticky;
            top: 80px;
            background: #ffffff;
        }

        .result-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 1rem;
        }

        .price-display {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #000;
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .breakdown-label {
            color: #666;
        }

        .breakdown-value {
            font-weight: 600;
            color: #000;
        }

        .sub-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }

        .sub-info-item {
            text-align: left;
        }

        .sub-info-label {
            color: #999;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .sub-info-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .error {
            padding: 0.75rem;
            background: #fff3f3;
            border: 1px solid #ffdddd;
            border-radius: 6px;
            color: #d32f2f;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .info-text {
            padding: 1.5rem;
            background: #f9f9f9;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            color: #999;
            text-align: center;
            font-size: 0.9rem;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .admin-grid { grid-template-columns: 1fr; }
        }

        .card {
            border: 1px solid #f0f0f0;
            padding: 2rem;
            border-radius: 8px;
        }

        .card h3 {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 1rem;
        }

        .campground-item {
            padding: 1rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .campground-item:last-child {
            border-bottom: none;
        }

        .campground-item h4 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .campground-item p {
            font-size: 0.8rem;
            color: #999;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .stat-card {
            padding: 1rem;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const formatCAD = (value) => new Intl.NumberFormat('fr-CA', { style: 'currency', currency: 'CAD' }).format(value);
        const calculateNights = (start, end) => start && end ? Math.max(0, Math.ceil((new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24))) : 0;
        const getSeason = (date) => new Date(date).getMonth() >= 5 && new Date(date).getMonth() <= 7 ? 'haute' : 'basse';
        const isWeekend = (date) => [5, 6].includes(new Date(date).getDay());

        const calculateCost = (params) => {
            const { startDate, endDate, numAdults, numChildren, campground, accommodationType, extras } = params;
            let breakdown = { nuits: 0, hebergement: 0, acces: 0, reservation: 0, extras: 0, taxes: 0 };

            if (!campground || !startDate || !endDate || !accommodationType) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Complétez tous les champs' };

            const nights = calculateNights(startDate, endDate);
            const totalPersons = numAdults + numChildren;

            if (nights === 0) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Minimum 1 nuit' };
            if (totalPersons === 0) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Minimum 1 personne' };

            const accType = campground.accommodationTypes?.[accommodationType];
            if (!accType) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: 'Type invalide' };

            const minNights = Object.values(accType.pricing).reduce((min, p) => Math.min(min, p.minNights || 2), 999);
            const maxNights = Object.values(accType.pricing).reduce((max, p) => Math.max(max, p.maxNights || 7), 0);

            if (nights < minNights) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: `Min ${minNights} nuit(s)` };
            if (nights > maxNights) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: `Max ${maxNights} nuit(s)` };
            if (totalPersons > accType.maxCapacity) return { total: 0, totalPerPerson: 0, totalPerNight: 0, breakdown, error: `Max ${accType.maxCapacity} pers.` };

            breakdown.nuits = nights;

            let nightlyRate = 0;
            let currentDate = new Date(startDate);
            while (currentDate < new Date(endDate)) {
                const season = getSeason(currentDate.toISOString().split('T')[0]);
                const weekend = isWeekend(currentDate.toISOString().split('T')[0]);
                const pricing = accType.pricing[season];
                nightlyRate += weekend ? (pricing.weekend || pricing.weekday) : pricing.weekday;
                currentDate.setDate(currentDate.getDate() + 1);
            }
            breakdown.hebergement = nightlyRate;

            let acces = 0;
            if (campground.accessFeeAdult !== undefined) {
                acces = (campground.accessFeeAdult || 0) * numAdults + (campground.accessFeeChild || 0) * numChildren;
            } else {
                acces = (campground.accessFee || 0) * totalPersons;
            }
            breakdown.acces = acces;
            breakdown.reservation = campground.reservationFee || 0;

            let extrasTotal = 0;
            extras.forEach(extra => {
                if (extra.quantity > 0) {
                    const extraData = campground.extras.find(e => e.id === extra.id);
                    if (extraData) {
                        const multiplier = extraData.billedPer === 'jour' ? nights : 1;
                        extrasTotal += extraData.price * extra.quantity * multiplier;
                    }
                }
            });
            breakdown.extras = extrasTotal;

            let subtotal = breakdown.hebergement + breakdown.acces + breakdown.reservation + breakdown.extras;
            breakdown.taxes = subtotal * 0.15;
            const total = subtotal + breakdown.taxes;

            return {
                total: Math.round(total * 100) / 100,
                totalPerPerson: totalPersons > 0 ? Math.round((total / totalPersons) * 100) / 100 : 0,
                totalPerNight: nights > 0 ? Math.round((total / nights) * 100) / 100 : 0,
                breakdown: {
                    nuits: nights,
                    hebergement: Math.round(breakdown.hebergement * 100) / 100,
                    acces: Math.round(breakdown.acces * 100) / 100,
                    reservation: Math.round(breakdown.reservation * 100) / 100,
                    extras: Math.round(breakdown.extras * 100) / 100,
                    taxes: Math.round(breakdown.taxes * 100) / 100
                },
                error: null
            };
        };

        const DEFAULT_CAMPGROUNDS = [
            {
                id: 2,
                name: 'SÉPAQ',
                region: 'Partout au Québec',
                maxCapacity: 8,
                dogsAllowed: false,
                accessFeeAdult: 8.78,
                accessFeeChild: 0,
                reservationFee: 0,
                accommodationTypes: {
                    'camping-ns': {
                        label: 'Camping sans service',
                        maxCapacity: 8,
                        pricing: {
                            basse: { weekday: 40.25, weekend: 45.10, minNights: 1, maxNights: 30 },
                            haute: { weekday: 40.25, weekend: 45.10, minNights: 1, maxNights: 30 }
                        }
                    }
                },
                extras: []
            },
            {
                id: 1,
                name: 'Parc du Poisson Blanc',
                region: 'Outaouais',
                maxCapacity: 16,
                dogsAllowed: true,
                maxDogs: 2,
                accessFee: 1.78,
                reservationFee: 0,
                accommodationTypes: {
                    '1tente': { label: '1 tente', maxCapacity: 4, pricing: { basse: { weekday: 59.00, weekend: 79.00, minNights: 2, maxNights: 7 }, haute: { weekday: 89.00, weekend: 89.00, minNights: 2, maxNights: 7 } } },
                    '2tentes': { label: '2 tentes', maxCapacity: 8, pricing: { basse: { weekday: 69.00, weekend: 99.00, minNights: 2, maxNights: 7 }, haute: { weekday: 109.00, weekend: 109.00, minNights: 2, maxNights: 7 } } },
                    '3tentes': { label: '3 tentes', maxCapacity: 12, pricing: { basse: { weekday: 79.00, weekend: 119.00, minNights: 2, maxNights: 7 }, haute: { weekday: 129.00, weekend: 129.00, minNights: 2, maxNights: 7 } } },
                    '4tentes': { label: '4 tentes', maxCapacity: 16, pricing: { basse: { weekday: 89.00, weekend: 139.00, minNights: 2, maxNights: 7 }, haute: { weekday: 149.00, weekend: 149.00, minNights: 2, maxNights: 7 } } }
                },
                extras: [
                    { id: 1, name: 'Canot 2 bancs', price: 43.00, billedPer: 'jour' },
                    { id: 2, name: 'Abitibi & Co - Canot 2 bancs', price: 51.00, billedPer: 'jour' },
                    { id: 3, name: 'Canot 3 bancs', price: 51.00, billedPer: 'jour' },
                    { id: 4, name: 'Canot 4 bancs', price: 61.00, billedPer: 'jour' },
                    { id: 5, name: 'Kayak de mer solo', price: 38.00, billedPer: 'jour' },
                    { id: 6, name: 'Surf à pagaie', price: 33.00, billedPer: 'jour' },
                    { id: 7, name: 'Surf à pagaie - Touring', price: 38.00, billedPer: 'jour' },
                    { id: 8, name: 'Surf à pagaie enfants', price: 22.00, billedPer: 'jour' }
                ]
            }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('calculator');
            const [campgrounds, setCampgrounds] = useState(() => {
                const saved = localStorage.getItem('campgrounds');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.length > 1 || parsed[0]?.name === 'Camping Mont-Tremblant') {
                            localStorage.removeItem('campgrounds');
                            return DEFAULT_CAMPGROUNDS;
                        }
                        return parsed;
                    } catch { return DEFAULT_CAMPGROUNDS; }
                }
                return DEFAULT_CAMPGROUNDS;
            });

            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [numAdults, setNumAdults] = useState(2);
            const [numChildren, setNumChildren] = useState(0);
            const [selectedCampground, setSelectedCampground] = useState(null);
            const [accommodationType, setAccommodationType] = useState('');
            const [extras, setExtras] = useState([]);

            useEffect(() => {
                if (campgrounds.length > 0 && !selectedCampground) {
                    const firstCampground = campgrounds[0];
                    setSelectedCampground(firstCampground);
                    setExtras(firstCampground.extras.map(e => ({ id: e.id, quantity: 0 })));
                    const firstKey = Object.keys(firstCampground.accommodationTypes || {})[0];
                    if (firstKey) setAccommodationType(firstKey);
                }
            }, []);

            useEffect(() => {
                if (selectedCampground) {
                    setExtras(selectedCampground.extras.map(e => ({ id: e.id, quantity: 0 })));
                    const firstKey = Object.keys(selectedCampground.accommodationTypes || {})[0];
                    if (firstKey) setAccommodationType(firstKey);
                }
            }, [selectedCampground]);

            const result = calculateCost({ startDate, endDate, numAdults, numChildren, campground: selectedCampground, accommodationType, extras });

            return (
                <div className="container">
                    <div className="header">
                        <h1>CampCalc</h1>
                        <p>Calculateur de camping</p>
                    </div>

                    <div className="tabs">
                        <button className={`tab-btn ${activeTab === 'calculator' ? 'active' : ''}`} onClick={() => setActiveTab('calculator')}>Calculateur</button>
                        <button className={`tab-btn ${activeTab === 'admin' ? 'active' : ''}`} onClick={() => setActiveTab('admin')}>Gestion</button>
                    </div>

                    <div className="content">
                        {activeTab === 'calculator' && (
                            <div className="calculator">
                                <div>
                                    <div className="form-group">
                                        <label>Camping</label>
                                        <div className="campground-list">
                                            {campgrounds.map(camp => (
                                                <div key={camp.id} className={`campground-card ${selectedCampground?.id === camp.id ? 'selected' : ''}`} onClick={() => setSelectedCampground(camp)}>
                                                    <div>
                                                        <h4>{camp.name}</h4>
                                                        <p>{camp.region}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {selectedCampground && (
                                        <>
                                            <div className="form-row">
                                                <div className="form-group">
                                                    <label>Arrivée</label>
                                                    <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
                                                </div>
                                                <div className="form-group">
                                                    <label>Départ</label>
                                                    <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} />
                                                </div>
                                            </div>

                                            <div className="form-row">
                                                <div className="form-group">
                                                    <label>Adultes</label>
                                                    <input type="number" min="0" value={numAdults} onChange={(e) => setNumAdults(Math.max(0, parseInt(e.target.value) || 0))} />
                                                </div>
                                                <div className="form-group">
                                                    <label>Enfants</label>
                                                    <input type="number" min="0" value={numChildren} onChange={(e) => setNumChildren(Math.max(0, parseInt(e.target.value) || 0))} />
                                                </div>
                                            </div>

                                            <div className="form-group">
                                                <label>Hébergement</label>
                                                <select value={accommodationType} onChange={(e) => setAccommodationType(e.target.value)}>
                                                    {Object.entries(selectedCampground.accommodationTypes || {}).map(([key, type]) => (
                                                        <option key={key} value={key}>{type.label}</option>
                                                    ))}
                                                </select>
                                            </div>

                                            {selectedCampground.extras.length > 0 && (
                                                <div className="form-group">
                                                    <label>Extras</label>
                                                    <div className="extras-list">
                                                        {selectedCampground.extras.map(extra => {
                                                            const extrasState = extras.find(e => e.id === extra.id) || { quantity: 0 };
                                                            return (
                                                                <div key={extra.id} className="extra-item">
                                                                    <div>
                                                                        <div className="extra-name">{extra.name}</div>
                                                                        <div className="extra-price">{formatCAD(extra.price)}/{extra.billedPer === 'jour' ? 'jour' : 'séjour'}</div>
                                                                    </div>
                                                                    <div className="qty-control">
                                                                        <button className="qty-btn" onClick={() => setExtras(extras.map(e => e.id === extra.id ? { ...e, quantity: Math.max(0, e.quantity - 1) } : e))}>−</button>
                                                                        <span className="qty-display">{extrasState.quantity}</span>
                                                                        <button className="qty-btn" onClick={() => setExtras(extras.map(e => e.id === extra.id ? { ...e, quantity: e.quantity + 1 } : e))}>+</button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}
                                        </>
                                    )}
                                </div>

                                <div>
                                    <div className="results-box">
                                        <div className="result-label">Total</div>
                                        {result.error ? (
                                            <div className="error">{result.error}</div>
                                        ) : result.total > 0 ? (
                                            <>
                                                <div className="price-display">{formatCAD(result.total)}</div>
                                                <div className="breakdown-row">
                                                    <span className="breakdown-label">Hébergement</span>
                                                    <span className="breakdown-value">{formatCAD(result.breakdown.hebergement)}</span>
                                                </div>
                                                {result.breakdown.acces > 0 && (
                                                    <div className="breakdown-row">
                                                        <span className="breakdown-label">Accès</span>
                                                        <span className="breakdown-value">{formatCAD(result.breakdown.acces)}</span>
                                                    </div>
                                                )}
                                                {result.breakdown.extras > 0 && (
                                                    <div className="breakdown-row">
                                                        <span className="breakdown-label">Extras</span>
                                                        <span className="breakdown-value">{formatCAD(result.breakdown.extras)}</span>
                                                    </div>
                                                )}
                                                <div className="breakdown-row">
                                                    <span className="breakdown-label">Taxes</span>
                                                    <span className="breakdown-value">{formatCAD(result.breakdown.taxes)}</span>
                                                </div>
                                                <div className="sub-info">
                                                    <div className="sub-info-item">
                                                        <div className="sub-info-label">Par personne</div>
                                                        <div className="sub-info-value">{formatCAD(result.totalPerPerson)}</div>
                                                    </div>
                                                    <div className="sub-info-item">
                                                        <div className="sub-info-label">Par nuit</div>
                                                        <div className="sub-info-value">{formatCAD(result.totalPerNight)}</div>
                                                    </div>
                                                </div>
                                            </>
                                        ) : (
                                            <div className="info-text">Remplissez les champs pour calculer</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="admin-grid">
                                <div className="card">
                                    <h3>Campings</h3>
                                    {campgrounds.map(camp => (
                                        <div key={camp.id} className="campground-item">
                                            <h4>{camp.name}</h4>
                                            <p>{camp.region}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="card">
                                    <h3>Infos</h3>
                                    <div className="stats-grid">
                                        <div className="stat-card">
                                            <div className="stat-label">Campings</div>
                                            <div className="stat-value">{campgrounds.length}</div>
                                        </div>
                                        <div className="stat-card">
                                            <div className="stat-label">Régions</div>
                                            <div className="stat-value">{new Set(campgrounds.map(c => c.region)).size}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
